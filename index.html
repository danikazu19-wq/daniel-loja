<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Store Sistema Completo</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

header{
    padding:15px;
    background:#111;
    display:flex;
    justify-content:space-between;
}

button{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

input{
    padding:6px;
    margin:5px 0;
    border-radius:6px;
    border:none;
}

.hidden{ display:none; }

.container{
    padding:20px;
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.produto{
    background:#1e2a38;
    padding:15px;
    border-radius:10px;
    width:200px;
    text-align:center;
}

.admin-box{
    background:#1e2a38;
    padding:20px;
    margin:20px;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<h2 style="text-align:center;">🔐 Login</h2>
<div style="text-align:center;">
<input id="user" placeholder="Usuário"><br>
<input id="pass" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- LOJA -->
<div id="storePage" class="hidden">
<header>
<span>Bem-vindo, <span id="userName"></span></span>
<button onclick="logout()">Sair</button>
</header>

<h2 style="text-align:center;">🛒 Loja</h2>
<div class="container" id="listaProdutos"></div>
</div>

<!-- DASHBOARD DEV -->
<div id="adminPage" class="hidden">
<header>
<span>👑 Dashboard do Dev</span>
<button onclick="logout()">Sair</button>
</header>

<div class="admin-box">
<h3>Adicionar Produto</h3>
<input id="novoNome" placeholder="Nome do produto"><br>
<input id="novoPreco" placeholder="Preço"><br>
<input id="novoImagem" placeholder="<input id="novoNome" placeholder="Nome do produto"><br>
<input id="novoPreco" placeholder="Preço"><br>
<input id="novoImagem" placeholder="URL da imagem"><br>"><br>
<button onclick="adicionarProduto()">Adicionar</button>
</div>

<div class="admin-box">
<h3>Produtos Cadastrados</h3>
<div id="adminLista"></div>
</div>
</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [
    {nome:"Mouse Gamer", preco:99},
    {nome:"Teclado Mecânico", preco:199}
];

function salvarProdutos(){
    localStorage.setItem("produtos", JSON.stringify(produtos));
}

function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "dev" && pass === "123"){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
        atualizarAdmin();
        return;
    }

    if(user){
        localStorage.setItem("usuario", user);
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("storePage").classList.remove("hidden");
        document.getElementById("userName").innerText = user;
        atualizarLoja();
    }
}

function logout(){
    location.reload();
}

function atualizarLoja(){
    let lista = document.getElementById("listaProdutos");
    lista.innerHTML = "";

    produtos.forEach(p=>{
        let div = document.createElement("div");
        div.className="produto";
        div.innerHTML = `
            <h3>${p.nome}</h3>
            <p>R$ ${p.preco}</p>
            <button>Comprar</button>
        `;
        lista.appendChild(div);
    });
}

function atualizarAdmin(){
    let lista = document.getElementById("adminLista");
    lista.innerHTML = "";

    produtos.forEach((p,index)=>{
        let div = document.createElement("div");
        div.innerHTML = `
            ${p.nome} - R$ ${p.preco}
            <button onclick="removerProduto(${index})">Excluir</button>
        `;
        lista.appendChild(div);
    });
}

function adicionarProduto(){
    let nome = document.getElementById("novoNome").value;
    let preco = document.getElementById("novoPreco").value;

    if(nome && preco){
        produtos.push({nome:nome, preco:preco});
        salvarProdutos();
        atualizarAdmin();
    }
}

function removerProduto(index){
    produtos.splice(index,1);
    salvarProdutos();
    atualizarAdmin();
}

</script>

</body>
</html>
