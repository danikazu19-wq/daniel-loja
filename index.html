<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja Ultra Braba</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f0c29;
color:white;
}

/* HEADER */
header{
background:black;
padding:20px;
text-align:center;
font-family:'Bangers';
font-size:40px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

/* CAPA COM PARALLAX */
.capa{
width:100%;
height:500px;
background-image:url("capa.png"); /* coloque sua imagem aqui */
background-size:cover;
background-position:center;
background-attachment:fixed;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* TEXTO SOBRE A CAPA */
.textoCapa{
font-family:'Bangers';
font-size:60px;
color:white;
text-shadow:0 0 20px #00f7ff, 0 0 40px #ff00c8;
padding:20px;
}

/* CONTEÚDO */
.conteudo{
padding:40px;
text-align:center;
}

/* RESPONSIVO PARA CELULAR */
@media(max-width:768px){

.capa{
height:300px;
background-attachment:scroll; /* melhora no celular */
}

.textoCapa{
font-size:35px;
}

header{
font-size:28px;
}

}

</style>
</head>

<body>

<header>🔥 LOJA ULTRA BRABA 🔥</header>

<div class="capa">
<h1 class="textoCapa">
BEM-VINDO À<br>
LOJA MAIS BRABA DO BRASIL
</h1>
</div>

<div class="conteudo">
<h2>Produtos Gamers Insanos 😈</h2>
<p>Aqui você encontra teclado, mouse e headset nível PRO!</p>
</div>

</body>
</html>
