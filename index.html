<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff416c,#ff4b2b,#ffcc33,#33ccff,#9b59b6);
    background-size:400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
header{
    text-align:center;
    padding:20px 10px;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 5px rgba(0,0,0,0.5);
    position:relative;
}
#carrinho{
    position:absolute;
    right:10px;
    top:20px;
    font-size:16px;
    background: rgba(255,255,255,0.3);
    padding:6px 12px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}
#carrinho:hover{
    background: rgba(255,255,255,0.6);
}
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}
.produto{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:20px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}
.produto:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
}
.produto img{
    border-radius:10px;
    margin-bottom:10px;
    width:100%;
    max-width:150px;
    transition: all 0.3s;
}
.produto img:hover{
    transform: scale(1.1) rotate(2deg);
}
.produto h2{
    margin-bottom:8px;
    font-size:18px;
}
.preco{
    font-size:16px;
    margin:8px 0;
    color:#fff;
}
button{
    padding:8px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-weight:bold;
    transition: all 0.3s;
}
button:hover{
    background:#000;
    color:#fff;
    transform: scale(1.1);
}
/* Carrinho modal */
<!-- Carrinho Modal (apenas a parte relevante do CSS e HTML) -->
<style>
#modalCarrinho .conteudo ul{
    list-style:none;
    padding:0;
    margin:0;
}

.carrinho-item{
    display:flex;            /* itens na horizontal */
    justify-content:space-between; /* nome e botão nas extremidades */
    align-items:center;
    margin-bottom:10px;
    background:rgba(0,0,0,0.05);
    padding:8px 10px;
    border-radius:8px;
}

.carrinho-item button{
    padding:4px 8px;
    font-size:12px;
    background:#ff4b2b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.carrinho-item button:hover{
    background:#ff1a00;
}
</style>

<!-- Dentro do modal -->
<div id="modalCarrinho">
    <div class="conteudo">
        <h2>Carrinho</h2>
        <ul id="listaCarrinho"></ul>
        <button id="limparCarrinho" onclick="limparCarrinho()">Limpar Carrinho</button>
        <button onclick="fecharCarrinho()">Fechar</button>
    </div>
</div>

<script>
let contador=0;
let carrinho=[];

function comprarProduto(nome,preco){
    contador++;
    document.getElementById("contador").innerText=contador;

    let item=carrinho.find(p=>p.nome===nome);
    if(item){ item.quantidade++; }
    else{ carrinho.push({nome:nome,preco:preco,quantidade:1}); }
}

function abrirCarrinho(){
    atualizarCarrinho();
    document.getElementById("modalCarrinho").classList.add("active");
}

function fecharCarrinho(){
    document.getElementById("modalCarrinho").classList.remove("active");
}

function atualizarCarrinho(){
    let lista=document.getElementById("listaCarrinho");
    lista.innerHTML="";
    carrinho.forEach((item,index)=>{
        let li=document.createElement("li");
        li.className="carrinho-item";
        li.innerHTML=`${item.nome} - ${item.preco} x ${item.quantidade} 
        <button onclick="removerItem(${index})">Remover</button>`;
        lista.appendChild(li);
    });
}

function removerItem(indice){
    carrinho.splice(indice,1);
    contador=carrinho.reduce((sum,item)=>sum+item.quantidade,0);
    document.getElementById("contador").innerText=contador;
    atualizarCarrinho();
}

function limparCarrinho(){
    carrinho=[];
    contador=0;
    document.getElementById("contador").innerText=contador;
    atualizarCarrinho();
}
</script>

</body>
</html>
