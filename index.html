<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja Ultra Braba</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f0c29;
color:white;
}

/* HEADER */
header{
background:black;
padding:20px;
text-align:center;
font-family:'Bangers';
font-size:40px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

/* CAPA */
.capa{
width:100%;
height:500px;
background-image:url("capa.png"); /* coloque sua imagem */
background-size:cover;
background-position:center;
background-attachment:fixed;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.textoCapa{
font-family:'Bangers';
font-size:60px;
text-shadow:0 0 20px #00f7ff, 0 0 40px #ff00c8;
margin-bottom:20px;
}

/* BOTÃO */
.botaoLoja{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00f7ff;
color:black;
font-weight:bold;
transition:0.3s;
}

.botaoLoja:hover{
background:#ff00c8;
color:white;
box-shadow:0 0 20px #ff00c8;
transform:scale(1.1);
}

/* SEÇÃO LOJA */
#loja{
padding:50px 20px;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.produto{
background:#1b1b2f;
padding:15px;
border-radius:15px;
width:220px;
box-shadow:0 0 15px rgba(0,255,255,0.4);
transition:0.3s;
}

.produto:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00f7ff;
}

.produto img{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#00f7ff;
color:black;
transition:0.3s;
}

button:hover{
background:#ff00c8;
color:white;
}

/* RESPONSIVO */
@media(max-width:768px){

.capa{
height:300px;
background-attachment:scroll;
}

.textoCapa{
font-size:35px;
}

header{
font-size:28px;
}

}

</style>
</head>

<body>

<header>🔥 LOJA ULTRA BRABA 🔥</header>

<div class="capa">
<h1 class="textoCapa">
BEM-VINDO À<br>LOJA MAIS BRABA
</h1>

<a href="#loja">
<button class="botaoLoja">🔥 VER LOJA 🔥</button>
</a>

</div>

<section id="loja">
<h2>🎮 Nossos Produtos</h2>

<div class="container">

<div class="produto">
<img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560">
<h3>Teclado Gamer RGB</h3>
<p>R$ 99,90</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg">
<h3>Mouse Gamer RGB</h3>
<p>R$ 249,90</p>
<button>Comprar</button>
</div>

<div class="produto">
<img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg">
<h3>Headset Gamer</h3>
<p>R$ 179,90</p>
<button>Comprar</button>
</div>

</div>
</section>

</body>
</html>
