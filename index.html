<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja do Daniel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

header{
    background:#00ffcc;
    color:black;
    padding:20px;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.produto{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    width:200px;
    text-align:center;
}

.produto button{
    background:#00ffcc;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

.produto button:hover{
    background:#00ccaa;
}
</style>

</head>
<body>

<header>
    <h1>🛒 Loja Gamer do Daniel</h1>
</header>

<div class="container">

    <div class="produto">
        <h2>Mouse Gamer</h2>
        <p>R$ 99,90</p>
        <button onclick="comprar()">Comprar</button>
    </div>

    <div class="produto">
        <h2>Teclado RGB</h2>
        <p>R$ 199,90</p>
        <button onclick="comprar()">Comprar</button>
    </div>

    <div class="produto">
        <h2>Headset Pro</h2>
        <p>R$ 149,90</p>
        <button onclick="comprar()">Comprar</button>
    </div>

</div>

<script>
function comprar(){
    alert("Compra realizada com sucesso! 🔥 (brincadeira, loja fake 😎)");
}
</script>

</body>
</html>
