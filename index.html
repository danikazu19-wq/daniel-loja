<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja Ultra Braba</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f0c29;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-family:'Bangers';
font-size:40px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

.capa{
height:500px;
background:url("capa.png") center/cover fixed;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.textoCapa{
font-family:'Bangers';
font-size:60px;
text-shadow:0 0 20px #00f7ff,0 0 40px #ff00c8;
margin-bottom:20px;
}

.botaoLoja{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00f7ff;
font-weight:bold;
}

.botaoLoja:hover{
background:#ff00c8;
color:white;
}

section{padding:40px 20px;text-align:center;}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.produto{
background:#1b1b2f;
padding:15px;
border-radius:15px;
width:220px;
box-shadow:0 0 15px rgba(0,255,255,0.4);
}

.produto img{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#00f7ff;
}

button:hover{
background:#ff00c8;
color:white;
}

#carrinho,#admin{
background:#111;
margin:20px;
padding:20px;
border-radius:15px;
}

input{
margin:5px;
padding:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<header>🔥 LOJA ULTRA BRABA 🔥</header>

<button onclick="abrirAdmin()" style="position:absolute;top:20px;right:20px;">👑 Área do Dono</button>

<div class="capa">
<h1 class="textoCapa">BEM-VINDO À LOJA</h1>
<a href="#loja"><button class="botaoLoja">🔥 VER LOJA 🔥</button></a>
</div>

<section id="loja">
<h2>🎮 Produtos</h2>
<div class="container" id="produtos"></div>
</section>

<div id="carrinho">
<h2>🛒 Carrinho</h2>
<ul id="lista"></ul>
<p>Subtotal: R$ <span id="subtotal">0</span></p>
<p>Desconto: R$ <span id="desconto">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<input type="text" id="cupom" placeholder="Cupom">
<button onclick="aplicarCupom()">Aplicar Cupom</button>
</div>

<div id="admin" style="display:none;">
<h2>🔐 Dashboard do Dono</h2>

<h3>Adicionar Produto</h3>
<input id="novoNome" placeholder="Nome">
<input id="novoPreco" type="number" placeholder="Preço">
<input id="novoImg" placeholder="URL da imagem">
<input id="novoEstoque" type="number" placeholder="Estoque">
<button onclick="addProduto()">Adicionar</button>

<hr>

<h3>Alterar Produto</h3>
<input id="indexProduto" type="number" placeholder="ID do produto (0,1,2...)">
<input id="novoValor" type="number" placeholder="Novo preço">
<input id="novoEstoque2" type="number" placeholder="Novo estoque">
<button onclick="alterarProduto()">Atualizar</button>

<hr>

<h3>Criar Cupom</h3>
<input id="nomeCupom" placeholder="Nome do cupom">
<input id="valorCupom" type="number" placeholder="Desconto %">
<button onclick="criarCupom()">Criar Cupom</button>
</div>

<script>

let produtos=[
{nome:"Teclado Gamer RGB",preco:99.90,img:"https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560",estoque:5},
{nome:"Mouse Gamer RGB",preco:249.90,img:"https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg",estoque:3},
{nome:"Headset Gamer",preco:179.90,img:"https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg",estoque:4}
];

let carrinho=[];
let subtotal=0;
let descontoValor=0;
let cupons={"ULTRA10":10};

function mostrar(){
let area=document.getElementById("produtos");
area.innerHTML="";
produtos.forEach((p,i)=>{
area.innerHTML+=`
<div class="produto">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<p>Estoque: ${p.estoque}</p>
<button onclick="add(${i})">Comprar</button>
</div>`;
});
}

function add(i){
if(produtos[i].estoque<=0){alert("Sem estoque");return;}
produtos[i].estoque--;
carrinho.push(produtos[i]);
subtotal+=produtos[i].preco;
atualizarCarrinho();
mostrar();
}

function atualizarCarrinho(){
let lista=document.getElementById("lista");
lista.innerHTML="";
carrinho.forEach(item=>{
lista.innerHTML+=`<li>${item.nome} - R$ ${item.preco}</li>`;
});
document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("desconto").innerText=descontoValor.toFixed(2);
document.getElementById("total").innerText=(subtotal-descontoValor).toFixed(2);
}

function aplicarCupom(){
let c=document.getElementById("cupom").value;
if(cupons[c]){
descontoValor=subtotal*(cupons[c]/100);
alert("Cupom aplicado!");
}else{
alert("Cupom inválido!");
descontoValor=0;
}
atualizarCarrinho();
}

function abrirAdmin(){
let senha=prompt("Senha do dono:");
if(senha==="admin123"){
document.getElementById("admin").style.display="block";
}else{
alert("Senha incorreta!");
}
}

function addProduto(){
let nome=document.getElementById("novoNome").value;
let preco=parseFloat(document.getElementById("novoPreco").value);
let img=document.getElementById("novoImg").value;
let estoque=parseInt(document.getElementById("novoEstoque").value);
produtos.push({nome,preco,img,estoque});
mostrar();
alert("Produto adicionado!");
}

function alterarProduto(){
let i=parseInt(document.getElementById("indexProduto").value);
if(produtos[i]){
if(document.getElementById("novoValor").value)
produtos[i].preco=parseFloat(document.getElementById("novoValor").value);
if(document.getElementById("novoEstoque2").value)
produtos[i].estoque=parseInt(document.getElementById("novoEstoque2").value);
mostrar();
alert("Atualizado!");
}else{
alert("Produto não encontrado!");
}
}

function criarCupom(){
let nome=document.getElementById("nomeCupom").value;
let valor=parseFloat(document.getElementById("valorCupom").value);
cupons[nome]=valor;
alert("Cupom criado!");
}

mostrar();

</script>

</body>
</html>
