<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOJA ULTRA BRABA</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
transition:0.4s;
}

.light{
background:#f4f4f4;
color:black;
}

header{
background:black;
padding:20px;
text-align:center;
font-family:'Bangers';
font-size:40px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.produto{
background:#1b1b2f;
padding:15px;
border-radius:15px;
width:230px;
text-align:center;
transition:0.3s;
box-shadow:0 0 15px rgba(0,255,255,0.4);
}

.produto:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00f7ff;
}

.produto img{
width:100%;
border-radius:10px;
}

button{
margin-top:8px;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#00f7ff;
color:black;
transition:0.3s;
}

button:hover{
background:#ff00c8;
color:white;
box-shadow:0 0 15px #ff00c8;
}

#carrinho{
background:#111;
margin:20px;
padding:20px;
border-radius:15px;
}

.estrela{
cursor:pointer;
font-size:18px;
color:gray;
}

.ativa{
color:gold;
}

input, select{
padding:6px;
margin:5px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<header>🔥 LOJA ULTRA BRABA 🔥</header>

<div style="text-align:center;">
<input type="text" id="pesquisa" placeholder="Pesquisar produto..." onkeyup="filtrar()">
<select onchange="ordenar(this.value)">
<option value="">Ordenar</option>
<option value="menor">Menor preço</option>
<option value="maior">Maior preço</option>
</select>
<button onclick="modo()">Modo Claro/Escuro</button>
</div>

<div class="container" id="produtos"></div>

<div id="carrinho">
<h2>🛒 Carrinho</h2>
<ul id="lista"></ul>
<p>Total: R$ <span id="total">0</span></p>
<input type="text" id="cupom" placeholder="Cupom">
<button onclick="aplicarCupom()">Aplicar</button>
<button onclick="comprar()">Finalizar</button>
</div>

<audio id="som">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>

let produtos = [
{nome:"Teclado Gamer RGB",preco:99.90,img:"https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560",estoque:5},
{nome:"Mouse Gamer RGB",preco:249.90,img:"https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg",estoque:3},
{nome:"Headset Gamer",preco:179.90,img:"https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp",estoque:4}
];

let total = 0;
let desconto = 0;

function mostrar(){
let area = document.getElementById("produtos");
area.innerHTML="";
produtos.forEach((p,i)=>{
area.innerHTML+=`
<div class="produto">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<p>Estoque: ${p.estoque}</p>
<div>
<span class="estrela" onclick="avaliar(this)">★</span>
<span class="estrela" onclick="avaliar(this)">★</span>
<span class="estrela" onclick="avaliar(this)">★</span>
<span class="estrela" onclick="avaliar(this)">★</span>
<span class="estrela" onclick="avaliar(this)">★</span>
</div>
<button onclick="add(${i})">Comprar</button>
</div>`;
});
}

function add(i){
if(produtos[i].estoque<=0){
alert("Sem estoque!");
return;
}
produtos[i].estoque--;
total+=produtos[i].preco;

document.getElementById("lista").innerHTML+=
`<li>${produtos[i].nome} - R$ ${produtos[i].preco}</li>`;

document.getElementById("total").innerText=(total-desconto).toFixed(2);
document.getElementById("som").play();
mostrar();
}

function aplicarCupom(){
let c=document.getElementById("cupom").value;
if(c=="ULTRA10"){
desconto=total*0.1;
alert("Cupom aplicado!");
}else{
alert("Cupom inválido!");
}
document.getElementById("total").innerText=(total-desconto).toFixed(2);
}

function comprar(){
alert("Compra finalizada 🔥");
location.reload();
}

function avaliar(el){
el.classList.toggle("ativa");
}

function modo(){
document.body.classList.toggle("light");
}

function filtrar(){
let texto=document.getElementById("pesquisa").value.toLowerCase();
let cards=document.querySelectorAll(".produto");
cards.forEach(card=>{
card.style.display=
card.innerText.toLowerCase().includes(texto)
? "block":"none";
});
}

function ordenar(tipo){
if(tipo=="menor"){
produtos.sort((a,b)=>a.preco-b.preco);
}
if(tipo=="maior"){
produtos.sort((a,b)=>b.preco-a.preco);
}
mostrar();
}

mostrar();

</script>

</body>
</html>
