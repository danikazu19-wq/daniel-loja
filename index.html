<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>
<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff416c, #ff4b2b, #ffcc33, #33ccff, #9b59b6);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:20px 10px;
    font-size:28px;
    font-weight:bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    position: relative;
}

#carrinho{
    position: absolute;
    right: 10px;
    top: 20px;
    font-size:16px;
    background: rgba(255,255,255,0.3);
    padding:6px 12px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

#carrinho:hover{
    background: rgba(255,255,255,0.6);
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.produto{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:20px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.produto:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

.produto img{
    border-radius:10px;
    margin-bottom:10px;
    width:100%;
    max-width:150px;
    transition: all 0.3s;
}

.produto img:hover{
    transform: scale(1.1) rotate(2deg);
}

.produto h2{
    margin-bottom:8px;
    font-size:18px;
}

.preco{
    font-size:16px;
    margin:8px 0;
    color:#fff;
}

button{
    padding:8px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-weight:bold;
    transition: all 0.3s;
}

button:hover{
    background:#000;
    color:#fff;
    transform: scale(1.1);
}

/* Carrinho modal */
#modalCarrinho{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    z-index:1000;
    justify-content:center;
    align-items:center;
    display:flex;
}

#modalCarrinho .conteudo{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    max-height:80%;
    overflow-y:auto;
}

/* Responsivo */
@media (max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
        padding:10px;
        gap:15px;
    }

    .produto{
        width:90%;
        max-width:350px;
        padding:15px;
    }

    header{
        font-size:24px;
        padding:15px 10px;
    }

    #carrinho{
        font-size:14px;
        padding:5px 10px;
        top:15px;
        right:10px;
    }

    .produto h2{
        font-size:16px;
    }

    .preco{
        font-size:14px;
    }

    button{
        padding:6px 14px;
        font-size:14px;
    }
}
</style>
</head>
<body>

<header>
🛒 DANIEL STORE
<div id="carrinho" onclick="abrirCarrinho()">Carrinho: <span id="contador">0</span></div>
</header>

<div class="container">

<div class="produto">
    <img src="https://i.imgur.com/q5zR3Pn.png" alt="Mouse Gamer" width="150">
    <h2>Mouse Gamer RGB</h2>
    <p class="preco">R$ 99,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://i.imgur.com/YXKqS3W.png" alt="Teclado Mecânico" width="150">
    <h2>Teclado Mecânico</h2>
    <p class="preco">R$ 249,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://i.imgur.com/2ZbM1HZ.png" alt="Headset Pro" width="150">
    <h2>Headset Pro 7.1</h2>
    <p class="preco">R$ 179,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

</div>
</div>

<!-- Carrinho Modal -->
<div id="modalCarrinho">
    <div class="conteudo">
        <h2>Carrinho</h2>
        <ul id="listaCarrinho"></ul>
        <button onclick="fecharCarrinho()">Fechar</button>
    </div>
</div>

<script>
let contador = 0;
let carrinho = [];

function comprar(btn){
    contador++;
    document.getElementById("contador").innerText = contador;

    let produtoDiv = btn.parentNode;
    let produtoNome = produtoDiv.dataset.nome;
    let preco = produtoDiv.dataset.preco;

    let item = carrinho.find(p => p.nome === produtoNome);
    if(item){
        item.quantidade++;
    } else {
        carrinho.push({nome: produtoNome, preco: preco, quantidade:1});
    }
}

function abrirCarrinho(){
    atualizarCarrinho();
    document.getElementById("modalCarrinho").style.display = "flex";
}

function fecharCarrinho(){
    document.getElementById("modalCarrinho").style.display = "none";
}

function atualizarCarrinho(){
    let lista = document.getElementById("listaCarrinho");
    lista.innerHTML = "";
    carrinho.forEach(item => {
        let li = document.createElement("li");
        li.innerText = `${item.nome} - ${item.preco} x ${item.quantidade}`;
        lista.appendChild(li);
    });
}
</script>

</body>
</html>
