<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff416c,#ff4b2b,#ffcc33,#33ccff,#9b59b6);
    background-size:400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
header{
    text-align:center;
    padding:20px 10px;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 5px rgba(0,0,0,0.5);
    position:relative;
}
#carrinho{
    position:absolute;
    right:10px;
    top:20px;
    font-size:16px;
    background: rgba(255,255,255,0.3);
    padding:6px 12px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}
#carrinho:hover{
    background: rgba(255,255,255,0.6);
}
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}
.produto{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:20px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}
.produto:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
}
.produto img{
    border-radius:10px;
    margin-bottom:10px;
    width:100%;
    max-width:150px;
    transition: all 0.3s;
}
.produto img:hover{
    transform: scale(1.1) rotate(2deg);
}
.produto h2{
    margin-bottom:8px;
    font-size:18px;
}
.preco{
    font-size:16px;
    margin:8px 0;
    color:#fff;
}
button{
    padding:8px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-weight:bold;
    transition: all 0.3s;
}
button:hover{
    background:#000;
    color:#fff;
    transform: scale(1.1);
}
/* Carrinho modal */
#modalCarrinho{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    z-index:1000;
    justify-content:center;
    align-items:center;
}
#modalCarrinho.active{
    display:flex;
}
#modalCarrinho .conteudo{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:500px;
    max-height:80%;
    overflow-y:auto;
}
#modalCarrinho .conteudo ul{
    list-style:none;
    padding:0;
    margin:0;
}
.carrinho-item{
    display:flex; /* horizontal */
    justify-content:space-between; /* nome e botão nas extremidades */
    align-items:center;
    margin-bottom:10px;
    background:rgba(0,0,0,0.05);
    padding:8px 10px;
    border-radius:8px;
}
.carrinho-item button{
    padding:4px 8px;
    font-size:12px;
    background:#ff4b2b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.carrinho-item button:hover{
    background:#ff1a00;
}
#limparCarrinho{
    margin-top:10px;
    background:#555;
    color:white;
}
#limparCarrinho:hover{
    background:#222;
}
@media (max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
        padding:10px;
        gap:15px;
    }
    .produto{
        width:90%;
        max-width:350px;
        padding:15px;
    }
    header{
        font-size:24px;
        padding:15px 10px;
    }
    #carrinho{
        font-size:14px;
        padding:5px 10px;
        top:15px;
        right:10px;
    }
    .produto h2{
        font-size:16px;
    }
    .preco{
        font-size:14px;
    }
    button{
        padding:6px 14px;
        font-size:14px;
    }
}
</style>
</head>
<body>

<header>
🛒 DANIEL STORE
<div id="carrinho" onclick="abrirCarrinho()">Carrinho: <span id="contador">0</span></div>
</header>

<div class="container">
<div class="produto">
    <img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg" alt="blood A91" width="150">
    <h2>blood A91 RGB</h2>
    <p class="preco">R$ 99,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560" alt="Attack shark K86" width="150">
    <h2>Attack shark K86</h2>
    <p class="preco">R$ 249,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp" alt="Astro A50" width="150">
    <h2>Astro A50</h2>
    <p class="preco">R$ 179,90</p>
    <button onclick="comprar()">Comprar</button>
</div>
</div>

<div id="modalCarrinho">
    <div class="conteudo">
        <h2>Carrinho</h2>
        <ul id="listaCarrinho"></ul>
        <button id="limparCarrinho" onclick="limparCarrinho()">Limpar Carrinho</button>
        <button onclick="fecharCarrinho()">Fechar</button>
    </div>
</div>

<script>
let contador=0;
let carrinho=[];

function comprarProduto(nome,preco){
    contador++;
    document.getElementById("contador").innerText=contador;

    let item=carrinho.find(p=>p.nome===nome);
    if(item){ item.quantidade++; }
    else{ carrinho.push({nome:nome,preco:preco,quantidade:1}); }
}

function abrirCarrinho(){
    atualizarCarrinho();
    document.getElementById("modalCarrinho").classList.add("active");
}

function fecharCarrinho(){
    document.getElementById("modalCarrinho").classList.remove("active");
}

function atualizarCarrinho(){
    let lista=document.getElementById("listaCarrinho");
    lista.innerHTML="";
    carrinho.forEach((item,index)=>{
        let li=document.createElement("li");
        li.className="carrinho-item";
        li.innerHTML=`${item.nome} - ${item.preco} x ${item.quantidade} 
        <button onclick="removerItem(${index})">Remover</button>`;
        lista.appendChild(li);
    });
}

function removerItem(indice){
    carrinho.splice(indice,1);
    contador=carrinho.reduce((sum,item)=>sum+item.quantidade,0);
    document.getElementById("contador").innerText=contador;
    atualizarCarrinho();
}

function limparCarrinho(){
    carrinho=[];
    contador=0;
    document.getElementById("contador").innerText=contador;
    atualizarCarrinho();
}
</script>

</body>
</html>
