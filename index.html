<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>
<style>
/* === Corpo e gradiente === */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff416c, #ff4b2b, #ffcc33, #33ccff, #9b59b6);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* === Header === */
header{
    text-align:center;
    padding:30px;
    font-size:32px;
    font-weight:bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    position: relative;
}

#carrinho{
    position: absolute;
    right: 20px;
    top: 30px;
    font-size:18px;
    background: rgba(255,255,255,0.3);
    padding:8px 15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

#carrinho:hover{
    background: rgba(255,255,255,0.6);
}

/* === Container e produtos === */
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:40px;
}

.produto{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:25px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.produto:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.produto img{
    border-radius:10px;
    margin-bottom:15px;
    width:150px;
    transition: all 0.3s;
}

.produto img:hover{
    transform: scale(1.1) rotate(2deg);
}

.produto h2{
    margin-bottom:10px;
}

.preco{
    font-size:18px;
    margin:10px 0;
    color:#fff;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-weight:bold;
    transition: all 0.3s;
}

button:hover{
    background:#000;
    color:#fff;
    transform: scale(1.1);
}

/* === Responsivo === */
@media (max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<header>
🛒 DANIEL STORE
<div id="carrinho">Carrinho: <span id="contador">0</span></div>
</header>

<div class="container">

<div class="produto">
    <img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg" alt="blood A91"
 width="150">
    <h2>Mouse Gamer RGB</h2>
    <p class="preco">R$ 99,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp
        " alt="astro a50" width="150">
    <h2>Teclado Mecânico</h2>
    <p class="preco">R$ 249,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560" alt="Attack shark k86" width="150">
    <h2>Teclado Mecânico</h2>
    <p class="preco">R$ 249,90</p>
    <button onclick="comprar()">Comprar</button>
</div>
</div>

<script>
let contador = 0;

function comprar(){
    contador++;
    document.getElementById("contador").innerText = contador;
    alert("Produto adicionado ao carrinho 🔥 (Loja Fake)");
}
</script>

</body>
</html>
