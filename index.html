<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Store Pro</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    position:relative;
}

#carrinhoBtn{
    position:absolute;
    right:20px;
    top:20px;
    background:#00ffcc;
    color:black;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.produto{
    background:#1e2a38;
    padding:15px;
    border-radius:12px;
    width:220px;
    text-align:center;
}

.produto img{
    width:100%;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.comprar{
    background:#00ffcc;
    color:black;
}

.comprar:hover{
    background:#00ccaa;
}

/* MODAL */
#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

#modal.active{
    display:flex;
}

.modal-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:500px;
}

.carrinho-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.remover{
    background:red;
    color:white;
    font-size:12px;
}

.total{
    font-weight:bold;
    margin-top:10px;
}

.finalizar{
    background:green;
    color:white;
    margin-top:10px;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<header>
🚀 DANIEL STORE PRO
<div id="carrinhoBtn" onclick="abrirCarrinho()">
Carrinho (<span id="contador">0</span>)
</div>
</header>

<div class="container">

<div class="produto">
<img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560">
<h3>Teclado gamer RGB</h3>
<p>R$ 99,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Mouse Gamer RGB','R$ 99,90')">Comprar</button>
</div>

<div class="produto">
<img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg">
<h3>Mouse gamer RGB</h3>
<p>R$ 249,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Teclado Mecânico','R$ 249,90')">Comprar</button>
</div>

<div class="produto">
<img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp">
<h3>Headset Gamer</h3>
<p>R$ 179,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Headset Gamer','R$ 179,90')">Comprar</button>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-content">
<h2>Carrinho</h2>
<div id="listaCarrinho"></div>
<div class="total">Total: R$ <span id="valorTotal">0.00</span></div>
<button class="finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
<button onclick="limparCarrinho()">Limpar</button>
<button onclick="fecharCarrinho()">Fechar</button>
</div>
</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function salvarCarrinho(){
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function adicionarAoCarrinho(nome, preco){
    let item = carrinho.find(p => p.nome === nome);
    if(item){
        item.quantidade++;
    } else {
        carrinho.push({nome, preco, quantidade:1});
    }
    salvarCarrinho();
    atualizarCarrinho();
}

function atualizarCarrinho(){
    let lista = document.getElementById("listaCarrinho");
    lista.innerHTML = "";

    let total = 0;

    carrinho.forEach((item,index)=>{
        total += item.preco * item.quantidade;

        let div = document.createElement("div");
        div.className="carrinho-item";
        div.innerHTML=`
            ${item.nome} x${item.quantidade} - R$ ${(item.preco * item.quantidade).toFixed(2)}
            <button class="remover" onclick="removerItem(${index})">X</button>
        `;
        lista.appendChild(div);
    });

    document.getElementById("contador").innerText =
        carrinho.reduce((t,i)=> t+i.quantidade,0);

    document.getElementById("valorTotal").innerText = total.toFixed(2);
}

function removerItem(index){
    carrinho.splice(index,1);
    salvarCarrinho();
    atualizarCarrinho();
}

function limparCarrinho(){
    carrinho = [];
    salvarCarrinho();
    atualizarCarrinho();
}

function finalizarCompra(){
    alert("Compra realizada com sucesso 🚀🔥");
    limparCarrinho();
}

function abrirCarrinho(){
    document.getElementById("modal").classList.add("active");
}

function fecharCarrinho(){
    document.getElementById("modal").classList.remove("active");
}

atualizarCarrinho();

</script>

</body>
</html>
