<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff416c, #ff4b2b, #ffcc33, #33ccff, #9b59b6);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:30px;
    font-size:32px;
    font-weight:bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:40px;
}

.produto{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.produto:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.produto h2{
    margin-bottom:10px;
}

.preco{
    font-size:18px;
    margin:10px 0;
    color:#fff;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:black;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#000;
    color:#fff;
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
🛒 DANIEL STORE
</header>

<div class="container">

<div class="container">

<div class="produto">
    <img src="https://i.imgur.com/q5zR3Pn.png" alt="Mouse Gamer" width="150">
    <h2>Mouse Gamer RGB</h2>
    <p class="preco">R$ 99,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://i.imgur.com/YXKqS3W.png" alt="Teclado Mecânico" width="150">
    <h2>Teclado Mecânico</h2>
    <p class="preco">R$ 249,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
    <img src="https://i.imgur.com/2ZbM1HZ.png" alt="Headset Pro" width="150">
    <h2>Headset Pro 7.1</h2>
    <p class="preco">R$ 179,90</p>
    <button onclick="comprar()">Comprar</button>
</div>

</div>

<script>
function comprar(){
    alert("Produto adicionado ao carrinho 🔥 (Loja Fake)");
}
</script>

</body>
</html>
