<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Ultra Braba</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f0c29;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
font-family:'Bangers';
font-size:35px;
color:#00f7ff;
}

section{padding:20px;}

input{
margin:5px;
padding:8px;
border-radius:5px;
border:none;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00f7ff;
font-weight:bold;
}

button:hover{
background:#ff00c8;
color:white;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.produto{
background:#1b1b2f;
padding:15px;
border-radius:15px;
width:200px;
}

.produto img{
width:100%;
border-radius:10px;
}

#admin{
background:#111;
margin:20px;
padding:20px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<header>🔥 LOJA ULTRA BRABA 🔥</header>

<section>
<h3>Login Admin</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</section>

<div id="admin">
<h2>👑 Dashboard</h2>

<h3>Adicionar Produto</h3>
<input id="novoNome" placeholder="Nome">
<input id="novoPreco" type="number" placeholder="Preço">
<input id="novoImg" placeholder="URL imagem">
<input id="novoEstoque" type="number" placeholder="Estoque">
<button onclick="addProduto()">Adicionar</button>

<h3>Criar Cupom</h3>
<input id="nomeCupom" placeholder="Nome cupom">
<input id="valorCupom" type="number" placeholder="Desconto %">
<button onclick="criarCupom()">Criar</button>
</div>

<section>
<h2>🎮 Produtos</h2>
<div class="container" id="produtos"></div>
</section>

<section>
<h2>🛒 Carrinho</h2>
<ul id="lista"></ul>
<p>Subtotal: R$ <span id="subtotal">0</span></p>
<p>Desconto: R$ <span id="desconto">0</span></p>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<input id="cupom" placeholder="Cupom">
<button onclick="aplicarCupom()">Aplicar Cupom</button>
<button onclick="finalizar()">Finalizar</button>
</section>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [
{nome:"Teclado Gamer RGB",preco:99.90,img:"https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560",estoque:5},
{nome:"Mouse Gamer RGB",preco:249.90,img:"https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg",estoque:3}
];

let cupons = JSON.parse(localStorage.getItem("cupons")) || {"ULTRA10":10};
let carrinho=[];
let subtotal=0;
let descontoValor=0;

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos));
localStorage.setItem("cupons",JSON.stringify(cupons));
}

function mostrar(){
let area=document.getElementById("produtos");
area.innerHTML="";
produtos.forEach((p,i)=>{
area.innerHTML+=`
<div class="produto">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<p>Estoque: ${p.estoque}</p>
<button onclick="add(${i})">Comprar</button>
</div>`;
});
}
mostrar();

function add(i){
if(produtos[i].estoque<=0){alert("Sem estoque");return;}
produtos[i].estoque--;
carrinho.push(produtos[i]);
subtotal+=produtos[i].preco;
salvar();
atualizar();
mostrar();
}

function atualizar(){
document.getElementById("lista").innerHTML=
carrinho.map(p=>`<li>${p.nome} - R$ ${p.preco}</li>`).join("");
document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("desconto").innerText=descontoValor.toFixed(2);
document.getElementById("total").innerText=(subtotal-descontoValor).toFixed(2);
}

function aplicarCupom(){
let c=document.getElementById("cupom").value;
if(cupons[c]){
descontoValor=subtotal*(cupons[c]/100);
}else{
alert("Cupom inválido");
descontoValor=0;
}
atualizar();
}

function finalizar(){
alert("Compra finalizada 🔥");
carrinho=[];
subtotal=0;
descontoValor=0;
atualizar();
}

function login(){
if(document.getElementById("user").value==="admin" &&
document.getElementById("pass").value==="1234"){
document.getElementById("admin").style.display="block";
}else{
alert("Login inválido");
}
}

function addProduto(){
let nome=document.getElementById("novoNome").value;
let preco=parseFloat(document.getElementById("novoPreco").value);
let img=document.getElementById("novoImg").value;
let estoque=parseInt(document.getElementById("novoEstoque").value);
produtos.push({nome,preco,img,estoque});
salvar();
mostrar();
}

function criarCupom(){
let nome=document.getElementById("nomeCupom").value;
let valor=parseFloat(document.getElementById("valorCupom").value);
cupons[nome]=valor;
salvar();
}

</script>

</body>
</html>
