<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Store Ultra</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:24px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.produto{
    background:#1e2a38;
    padding:15px;
    border-radius:12px;
    width:220px;
    text-align:center;
    position:relative;
}

.produto img{
    width:100%;
    border-radius:8px;
}

.estoque{
    font-size:13px;
    color:#00ffcc;
}

button{
    margin-top:8px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.comprar{
    background:#00ffcc;
    color:black;
}

.avaliar span{
    cursor:pointer;
    font-size:18px;
}

#carrinho{
    background:#111;
    padding:15px;
    margin:20px;
    border-radius:12px;
}

.carrinho-item{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.carrinho-item img{
    width:50px;
    border-radius:6px;
}
</style>
</head>
<body>

<header>🔥 DANIEL STORE ULTRA 🔥</header>

<div class="container">

<div class="produto">
<img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560">
<h3>Teclado Gamer RGB</h3>
<p>R$ 99,90</p>
<div class="estoque" id="estoque0"></div>
<div class="avaliar" onclick="avaliar(0,this)">
⭐ ⭐ ⭐ ⭐ ⭐
</div>
<button class="comprar" onclick="adicionarAoCarrinho(0)">Comprar</button>
</div>

<div class="produto">
<img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg">
<h3>Mouse Gamer RGB</h3>
<p>R$ 249,90</p>
<div class="estoque" id="estoque1"></div>
<div class="avaliar" onclick="avaliar(1,this)">
⭐ ⭐ ⭐ ⭐ ⭐
</div>
<button class="comprar" onclick="adicionarAoCarrinho(1)">Comprar</button>
</div>

<div class="produto">
<img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp">
<h3>Headset Gamer</h3>
<p>R$ 179,90</p>
<div class="estoque" id="estoque2"></div>
<div class="avaliar" onclick="avaliar(2,this)">
⭐ ⭐ ⭐ ⭐ ⭐
</div>
<button class="comprar" onclick="adicionarAoCarrinho(2)">Comprar</button>
</div>

</div>

<div id="carrinho">
<h2>🛒 Carrinho</h2>
<div id="listaCarrinho"></div>
<h3>Total: R$ <span id="total">0.00</span></h3>
<button onclick="finalizar()">Finalizar Compra</button>
</div>

<script>

let produtos = [
{
nome:"Teclado Gamer RGB",
preco:99.90,
imagem:"https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560",
estoque:5
},
{
nome:"Mouse Gamer RGB",
preco:249.90,
imagem:"https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg",
estoque:3
},
{
nome:"Headset Gamer",
preco:179.90,
imagem:"https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp",
estoque:4
}
];

let carrinho = [];

function atualizarEstoque(){
produtos.forEach((p,i)=>{
document.getElementById("estoque"+i).innerText =
"Estoque: " + p.estoque;
});
}

function adicionarAoCarrinho(index){
let p = produtos[index];

if(p.estoque <= 0){
alert("Produto esgotado!");
return;
}

p.estoque--;

let item = carrinho.find(i=> i.nome === p.nome);

if(item){
item.quantidade++;
}else{
carrinho.push({...p, quantidade:1});
}

atualizarEstoque();
atualizarCarrinho();
}

function atualizarCarrinho(){
let lista = document.getElementById("listaCarrinho");
lista.innerHTML="";
let total=0;

carrinho.forEach(item=>{
total += item.preco * item.quantidade;

let div=document.createElement("div");
div.className="carrinho-item";
div.innerHTML=`
<img src="${item.imagem}">
${item.nome} x${item.quantidade} - R$ ${(item.preco*item.quantidade).toFixed(2)}
`;
lista.appendChild(div);
});

document.getElementById("total").innerText=total.toFixed(2);
}

function finalizar(){
alert("Compra realizada 🔥");
carrinho=[];
atualizarCarrinho();
}

function avaliar(index,element){
alert("Você avaliou o produto ⭐🔥");
}

atualizarEstoque();

</script>

</body>
</html>
