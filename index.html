<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daniel Store</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
}

header{
    text-align:center;
    padding:30px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:40px;
}

.produto{
    background:#ffffff10;
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:15px;
    width:220px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.produto:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.produto h2{
    margin-bottom:10px;
}

.preco{
    font-size:18px;
    margin:10px 0;
    color:#00ffcc;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#00ffcc;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#00ccaa;
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
🛒 DANIEL STORE
</header>

<div class="container">

<div class="produto">
<h2>Mouse Gamer RGB</h2>
<p class="preco">R$ 99,90</p>
<button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
<h2>Teclado Mecânico</h2>
<p class="preco">R$ 249,90</p>
<button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
<h2>Headset Pro 7.1</h2>
<p class="preco">R$ 179,90</p>
<button onclick="comprar()">Comprar</button>
</div>

</div>

<script>
function comprar(){
    alert("Produto adicionado ao carrinho 🔥 (Loja Fake)");
}
</script>

</body>
</html>
