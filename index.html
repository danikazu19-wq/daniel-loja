<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Store</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#ff416c,#ff4b2b,#ffcc33,#33ccff,#9b59b6);
    background-size:400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    position:relative;
}

#carrinhoBtn{
    position:absolute;
    right:20px;
    top:20px;
    background:white;
    color:black;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.produto{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:12px;
    width:220px;
    text-align:center;
}

.produto img{
    width:100%;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.comprar{
    background:white;
    color:black;
}

.comprar:hover{
    background:black;
    color:white;
}

/* MODAL */
#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

#modal.active{
    display:flex;
}

.modal-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:500px;
}

.carrinho-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.remover{
    background:red;
    color:white;
    font-size:12px;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<header>
🛒 DANIEL STORE
<div id="carrinhoBtn" onclick="abrirCarrinho()">
Carrinho (<span id="contador">0</span>)
</div>
</header>

<div class="container">

<div class="produto">
<img src="https://uk.whatgeek.com/cdn/shop/files/ATTACK_SHARK_K86_Wireless_Mechanical_Keyboard_11_700x.jpg?v=1731052560">
<h3>Teclado gamer RGB</h3>
<p>R$ 99,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Mouse Gamer RGB','R$ 99,90')">Comprar</button>
</div>

<div class="produto">
<img src="https://ae01.alicdn.com/kf/Saeab67a210814e4e8183334d68bbb396A.jpg">
<h3>Mouse gamer RGB</h3>
<p>R$ 249,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Teclado Mecânico','R$ 249,90')">Comprar</button>
</div>

<div class="produto">
<img src="https://pisces.bbystatic.com/image2/BestBuy_US/images/products/589d3b48-0f2b-43d7-924c-49dcfb8832ee.jpg;maxHeight=1920;maxWidth=900?format=webp">
<h3>Headset Gamer</h3>
<p>R$ 179,90</p>
<button class="comprar" onclick="adicionarAoCarrinho('Headset Gamer','R$ 179,90')">Comprar</button>
</div>

</div>

<!-- MODAL CARRINHO -->
<div id="modal">
<div class="modal-content">
<h2>Carrinho</h2>
<div id="listaCarrinho"></div>
<br>
<button onclick="limparCarrinho()">Limpar Carrinho</button>
<button onclick="fecharCarrinho()">Fechar</button>
</div>
</div>

<script>

let carrinho = [];

function adicionarAoCarrinho(nome, preco){

    let item = carrinho.find(produto => produto.nome === nome);

    if(item){
        item.quantidade++;
    } else {
        carrinho.push({nome:nome, preco:preco, quantidade:1});
    }

    atualizarCarrinho();
}

function atualizarCarrinho(){

    let lista = document.getElementById("listaCarrinho");
    lista.innerHTML = "";

    carrinho.forEach((item, index) => {

        let div = document.createElement("div");
        div.className = "carrinho-item";

        div.innerHTML = `
            ${item.nome} - ${item.preco} x ${item.quantidade}
            <button class="remover" onclick="removerItem(${index})">Remover</button>
        `;

        lista.appendChild(div);
    });

    let totalItens = carrinho.reduce((total, item) => total + item.quantidade, 0);
    document.getElementById("contador").innerText = totalItens;
}

function removerItem(index){
    carrinho.splice(index,1);
    atualizarCarrinho();
}

function limparCarrinho(){
    carrinho = [];
    atualizarCarrinho();
}

function abrirCarrinho(){
    document.getElementById("modal").classList.add("active");
}

function fecharCarrinho(){
    document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
